<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module 1 Lesson 6 Activity 1 - Personal Details Form</title>
  </head>
  <body>
    <h1>Personal Details Form</h1>
    <h3>Fill in these basic details to continue</h3>

    <form>
      <fieldset>
      <legend>
        <strong>Fill in your personal detials</strong>
      </legend>
      
      <label for="name">Name</label> <br>
      <!-- ADD AN INPUT - SIMPLE TEXT TYPE -->
       <input type="text" id ="name" name="name">
      <br><br>
      
      <label for="email">Email ID</label> <br>
      <!-- ADD AN INPUT - EMAIL TYPE -->
       <input type="email" id ="email" name="email">
      <br><br>
      
      <label for="contact">Contact Number (We won't reveal)</label> <br>
      <!-- ADD AN INPUT - PASSWORD TYPE -->
       <input type="password" id ="contact" name="contact">
      <br><br>
      
      Gender <br>
      <!-- ADD A LABELS/INPUTS - RADIO TYPE -->
       <label>
        <input type="radio" id="male" name="gender"> male
       </label>
       <label>
        <input type="radio" id="female" name="gender"> female
       </label>
      <br><br>
      
      Favorite food<br>
      <!-- ADD A LABELS/INPUTS - CHECKBOX TYPE -->
       <label>
        <input type="checkbox" id="pizza" name="food"> pizza
       </label>

       <label>
        <input type="checkbox" id="spagetti" name="food"> spagetti
       </label>

       <label>
        <input type="checkbox" id="burgers" name="food"> burgers
       </label>
      <br><br>
      <input type="submit" value="create account">
</fieldset>
    </form>
  </body>
</html>
